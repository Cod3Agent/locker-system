<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LockerBase — Pay Now</title>
<style>
:root{
  --bg:#0e1118;--surface:#14171f;--card:#1a1e2b;--border:#242840;
  --accent:#5b7fff;--warn:#f5a623;--danger:#e8455a;--success:#2ecc71;
  --text:#e4e8f5;--muted:#5a6080;--font:'Inter',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{font-weight:800;font-size:16px}.logo span{color:var(--accent)}
.user-pill{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}

.wrap{max-width:520px;margin:48px auto;padding:0 20px;width:100%}

/* AUTH */
#auth-section .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px}
.brand{font-size:20px;font-weight:800;margin-bottom:4px}.brand span{color:var(--accent)}
.brand-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.tabs{display:flex;background:var(--surface);border-radius:8px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--muted);border:none;background:none;transition:all .15s}
.tab.active{background:var(--card);color:var(--text)}
.auth-form{display:none}.auth-form.active{display:flex;flex-direction:column;gap:12px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.ff input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13.5px;outline:none;font-family:var(--font)}
.ff input:focus{border-color:var(--accent)}
.err{color:var(--danger);font-size:12px;text-align:center}

/* PORTAL */
#portal-section{display:none;flex-direction:column;gap:20px}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px}

/* LOCKER CARD */
.locker-row{display:flex;align-items:center;gap:16px}
.locker-icon{width:52px;height:52px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.locker-name{font-size:20px;font-weight:800}
.locker-sub{font-size:13px;color:var(--muted);margin-top:2px}
.locker-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
.meta{background:var(--surface);border-radius:8px;padding:10px 12px}
.meta-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.meta-val{font-size:15px;font-weight:700;margin-top:3px}

/* PAYMENT ITEMS */
.pay-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.pay-item:last-child{border-bottom:none}
.pay-title{font-size:14px;font-weight:600}
.pay-sub{font-size:12px;color:var(--muted);margin-top:2px}
.pay-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pay-amt{font-size:15px;font-weight:700}
.pill{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pill-green{background:rgba(46,204,113,.15);color:var(--success)}
.pill-warn{background:rgba(245,166,35,.15);color:var(--warn)}
.pill-red{background:rgba(232,69,90,.15);color:var(--danger)}

/* TICKET */
.tf{display:flex;flex-direction:column;gap:10px}
.tf-ff{display:flex;flex-direction:column;gap:5px}
.tf-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.tf-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13.5px;outline:none;font-family:var(--font);width:100%}
.tf-input:focus{border-color:var(--accent)}
textarea.tf-input{resize:vertical;min-height:80px}

.ticket-item{padding:12px 0;border-bottom:1px solid var(--border)}
.ticket-item:last-child{border-bottom:none}
.ticket-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.ticket-subject{font-weight:600;font-size:13px}
.ticket-msg{font-size:13px;color:var(--muted)}
.ticket-reply{background:rgba(91,127,255,.08);border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 6px 6px 0;font-size:13px;margin-top:8px}
.reply-label{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s,transform .1s;width:100%}
.btn:active{transform:scale(.97)}.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-stripe{background:#635bff;color:#fff}
.btn-sm{width:auto;padding:6px 13px;font-size:12px}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.btn-logout:hover{color:var(--text)}

/* BANNER */
.banner{padding:14px 16px;border-radius:10px;font-size:13px;margin-bottom:4px}
.banner-success{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:var(--success)}
.banner-warn{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--warn)}

.muted-msg{color:var(--muted);font-size:13px;text-align:center;padding:20px 0}

/* TOAST */
#toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 15px;font-size:13px;display:flex;align-items:center;gap:8px;animation:si .2s ease;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.success{border-color:var(--success)}.toast.error{border-color:var(--danger)}
@keyframes si{from{transform:translateX(50px);opacity:0}to{transform:none;opacity:1}}
</style>
</head>
<body>

<header>
  <div class="logo">Locker<span>Base</span></div>
  <div class="user-pill">
    <span id="header-name" style="display:none"></span>
    <button class="btn-logout" id="logout-btn" style="display:none" onclick="logout()">Sign out</button>
  </div>
</header>

<div class="wrap">

  <!-- AUTH -->
  <div id="auth-section">
    <div class="card">
      <div class="brand">Locker<span>Base</span></div>
      <div class="brand-sub">Sign in to manage your locker and pay online</div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('register')">Create Account</button>
      </div>
      <div class="auth-form active" id="form-login">
        <div class="ff"><label>Email</label><input type="email" id="li-email" placeholder="you@email.com"/></div>
        <div class="ff"><label>Password</label><input type="password" id="li-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <div class="err" id="li-err"></div>
        <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      </div>
      <div class="auth-form" id="form-register">
        <div class="ff"><label>Full Name</label><input type="text" id="rg-name" placeholder="Jane Smith"/></div>
        <div class="ff"><label>Email</label><input type="email" id="rg-email" placeholder="you@email.com"/></div>
        <div class="ff"><label>Password</label><input type="password" id="rg-pass" placeholder="Create a password"/></div>
        <div class="err" id="rg-err"></div>
        <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
      </div>
    </div>
  </div>

  <!-- PORTAL -->
  <div id="portal-section">

    <div id="pay-banner" style="display:none"></div>

    <!-- LOCKER INFO -->
    <div class="card">
      <div class="card-title">My Locker</div>
      <div id="locker-content"><div class="muted-msg">Loading…</div></div>
    </div>

    <!-- PAYMENTS -->
    <div class="card">
      <div class="card-title">Payments</div>
      <div id="payments-content"><div class="muted-msg">Loading…</div></div>
    </div>

    <!-- SUPPORT -->
    <div class="card">
      <div class="card-title">Submit a Request</div>
      <div class="tf">
        <div class="tf-ff"><label class="tf-label">Subject</label><input class="tf-input" id="t-subject" placeholder="Briefly describe the issue"/></div>
        <div class="tf-ff"><label class="tf-label">Message</label><textarea class="tf-input" id="t-msg" placeholder="Tell us more…"></textarea></div>
        <button class="btn btn-ghost" style="width:auto" onclick="submitTicket()">Submit Request</button>
      </div>
    </div>

    <!-- MY TICKETS -->
    <div class="card">
      <div class="card-title">My Requests</div>
      <div id="tickets-content"><div class="muted-msg">Loading…</div></div>
    </div>

  </div>
</div>

<div id="toast-wrap"></div>

<script>
const API = '';
let TOKEN = localStorage.getItem('pay_token') || '';

const h = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN });

async function apiFetch(method, path, body) {
  const res = await fetch(API + path, { method, headers: h(), body: body ? JSON.stringify(body) : undefined });
  if (res.status === 401) { logout(); return null; }
  if (!res.ok) { const e = await res.json(); toast(e.detail || 'Error', 'error'); return null; }
  return res.json();
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', i === (t === 'login' ? 0 : 1)));
  document.getElementById('form-login').classList.toggle('active', t === 'login');
  document.getElementById('form-register').classList.toggle('active', t === 'register');
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass  = document.getElementById('li-pass').value;
  const res   = await fetch(API + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password: pass }) });
  if (!res.ok) { document.getElementById('li-err').textContent = 'Invalid email or password'; return; }
  const json = await res.json();
  TOKEN = json.access_token;
  localStorage.setItem('pay_token', TOKEN);
  showPortal(json.name);
}

async function doRegister() {
  const name  = document.getElementById('rg-name').value.trim();
  const email = document.getElementById('rg-email').value.trim();
  const pass  = document.getElementById('rg-pass').value;
  if (!name || !email || !pass) { document.getElementById('rg-err').textContent = 'Fill all fields'; return; }
  const res = await fetch(API + '/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password: pass }) });
  if (!res.ok) { const e = await res.json(); document.getElementById('rg-err').textContent = e.detail; return; }
  const json = await res.json();
  TOKEN = json.access_token;
  localStorage.setItem('pay_token', TOKEN);
  showPortal(json.name);
}

function logout() {
  TOKEN = ''; localStorage.removeItem('pay_token');
  document.getElementById('portal-section').style.display = 'none';
  document.getElementById('auth-section').style.display = 'block';
  document.getElementById('header-name').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none';
}

function showPortal(name) {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('portal-section').style.display = 'flex';
  document.getElementById('header-name').textContent = name;
  document.getElementById('header-name').style.display = 'inline';
  document.getElementById('logout-btn').style.display = 'inline';
  checkPaymentReturn();
  loadAll();
}

function checkPaymentReturn() {
  const params = new URLSearchParams(location.search);
  const banner = document.getElementById('pay-banner');
  if (params.get('payment') === 'success') {
    banner.style.display = 'block';
    banner.className = 'banner banner-success';
    banner.textContent = '✓ Payment successful! Your locker is up to date.';
    history.replaceState(null, '', location.pathname);
  } else if (params.get('payment') === 'cancelled') {
    banner.style.display = 'block';
    banner.className = 'banner banner-warn';
    banner.textContent = 'Payment was cancelled. You can try again below.';
    history.replaceState(null, '', location.pathname);
  }
}

// ── DATA ──────────────────────────────────────────────────────────────────────
function loadAll() { loadLocker(); loadPayments(); loadTickets(); }

async function loadLocker() {
  const locker = await apiFetch('GET', '/customer/locker');
  const el = document.getElementById('locker-content');
  if (!locker) {
    el.innerHTML = `<div class="muted-msg">No locker assigned yet. Contact us if you believe this is an error.</div>`;
    return;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = locker.due_date ? new Date(locker.due_date + 'T00:00:00') : null;
  const diff  = due ? Math.round((due - today) / 86400000) : null;
  const badge = diff === null ? ''
    : diff < 0  ? `<span class="pill pill-red">⚠ Overdue</span>`
    : diff <= 7 ? `<span class="pill pill-warn">⏰ Due in ${diff}d</span>`
    : `<span class="pill pill-green">✓ Current</span>`;

  el.innerHTML = `
    <div class="locker-row">
      <div class="locker-icon">🔒</div>
      <div>
        <div class="locker-name">Locker ${locker.number} ${badge}</div>
        <div class="locker-sub">${locker.zone}</div>
      </div>
    </div>
    <div class="locker-meta">
      <div class="meta"><div class="meta-label">Zone</div><div class="meta-val">${locker.zone}</div></div>
      <div class="meta"><div class="meta-label">Monthly</div><div class="meta-val">$${locker.monthly_rate.toFixed(2)}</div></div>
      <div class="meta"><div class="meta-label">Next Due</div><div class="meta-val">${locker.due_date || '—'}</div></div>
    </div>
    ${locker.notes ? `<div style="margin-top:12px;font-size:13px;color:var(--muted)">📝 ${locker.notes}</div>` : ''}`;
}

async function loadPayments() {
  const pays = await apiFetch('GET', '/customer/payments');
  const el   = document.getElementById('payments-content');
  if (!pays || pays.length === 0) { el.innerHTML = `<div class="muted-msg">No payment records yet.</div>`; return; }

  el.innerHTML = pays.map(p => {
    const pill    = p.status === 'paid' ? 'pill-green' : p.status === 'overdue' ? 'pill-red' : 'pill-warn';
    const payBtn  = p.status !== 'paid'
      ? `<button class="btn btn-stripe btn-sm" onclick="checkout('${p.id}')">💳 Pay Now</button>` : '';
    return `<div class="pay-item">
      <div>
        <div class="pay-title">Locker ${p.locker?.number || '—'} — Monthly Rent</div>
        <div class="pay-sub">Due: ${p.due_date || '—'}${p.paid_at ? ' · Paid: ' + p.paid_at.slice(0,10) : ''}</div>
      </div>
      <div class="pay-right">
        <div class="pay-amt">$${p.amount.toFixed(2)}</div>
        <span class="pill ${pill}">${p.status}</span>
        ${payBtn}
      </div>
    </div>`;
  }).join('');
}

async function checkout(paymentId) {
  const res = await apiFetch('POST', `/payments/checkout/${paymentId}`);
  if (!res) return;
  window.location.href = res.checkout_url;
}

async function loadTickets() {
  const tix = await apiFetch('GET', '/customer/tickets');
  const el  = document.getElementById('tickets-content');
  if (!tix || tix.length === 0) { el.innerHTML = `<div class="muted-msg">No requests yet.</div>`; return; }
  el.innerHTML = tix.map(t => {
    const pill  = t.status === 'open' ? 'pill-red' : t.status === 'in_progress' ? 'pill-warn' : 'pill-green';
    const reply = t.admin_reply ? `<div class="ticket-reply"><div class="reply-label">Staff Reply</div>${t.admin_reply}</div>` : '';
    return `<div class="ticket-item">
      <div class="ticket-head"><div class="ticket-subject">${t.subject}</div><span class="pill ${pill}">${t.status.replace('_',' ')}</span></div>
      <div class="ticket-msg">${t.message}</div>${reply}
    </div>`;
  }).join('');
}

async function submitTicket() {
  const subject = document.getElementById('t-subject').value.trim();
  const message = document.getElementById('t-msg').value.trim();
  if (!subject || !message) { toast('Fill in both fields', 'error'); return; }
  const res = await apiFetch('POST', '/customer/tickets', { subject, message });
  if (!res) return;
  toast('Request submitted!', 'success');
  document.getElementById('t-subject').value = '';
  document.getElementById('t-msg').value = '';
  loadTickets();
}

function toast(msg, type = 'success') {
  const icons = { success: '✓', error: '✗', warn: '⚠' };
  const el = document.createElement('div'); el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span> ${msg}`;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// Auto-login if token saved
if (TOKEN) {
  fetch(API + '/customer/me', { headers: h() }).then(r => {
    if (r.ok) r.json().then(u => showPortal(u.name));
    else { TOKEN = ''; localStorage.removeItem('pay_token'); }
  });
}
</script>
</body>
</html>
